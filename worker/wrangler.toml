name = "maps-matmon-proxy"
main = "src/index.ts"
compatibility_date = "2026-04-01"

[vars]
# comma-separated exact allowed origins
# example: ALLOWED_ORIGINS = "https://gilad905.github.io,https://example.com"
ALLOWED_ORIGINS = "https://gilad905.github.io,http://localhost:5173"

# simple per-ip fixed-window limiter
RATE_LIMIT_WINDOW_SECONDS = "60"
RATE_LIMIT_MAX_REQUESTS = "60"